<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>F5AuthTester — SHA SSO Health</title>
  <style>
    :root {
      --bg: #0f1420; --panel: #172033; --panel2: #1e293f; --text: #e6ecf5;
      --muted: #93a1bd; --border: #2a3855;
      --ok: #2ecc71; --warn: #f1c40f; --fail: #e74c3c; --unknown: #7f8c9b; --skipped: #4a5675;
      --accent: #4f9dff;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f6fb; --panel: #ffffff; --panel2: #f0f3fa; --text: #1a2233;
        --muted: #5a6784; --border: #d9e0ee; --skipped: #b7c0d6;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    header { padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    h1 { font-size: 20px; margin: 0; letter-spacing: .2px; }
    h1 span { color: var(--accent); }
    .meta { color: var(--muted); font-size: 13px; }
    .spacer { flex: 1; }
    button { background: var(--accent); color: #fff; border: 0; border-radius: 8px;
      padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    main { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
    .summary { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .pill { display: flex; align-items: center; gap: 8px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 999px; padding: 7px 14px; font-size: 13px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
    .dot.ok { background: var(--ok); } .dot.warn { background: var(--warn); }
    .dot.fail { background: var(--fail); } .dot.unknown { background: var(--unknown); }
    .dot.skipped { background: var(--skipped); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; border-left: 4px solid var(--unknown); }
    .card.ok { border-left-color: var(--ok); } .card.warn { border-left-color: var(--warn); }
    .card.fail { border-left-color: var(--fail); } .card.unknown { border-left-color: var(--unknown); }
    .card.skipped { border-left-color: var(--skipped); }
    .card-head { padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
    .card-head .name { font-weight: 700; font-size: 15px; }
    .badge { font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
      color: var(--muted); background: var(--panel2); border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 6px; }
    .status-tag { margin-left: auto; font-weight: 700; font-size: 12px; text-transform: uppercase;
      letter-spacing: .5px; }
    .status-tag.ok { color: var(--ok); } .status-tag.warn { color: var(--warn); }
    .status-tag.fail { color: var(--fail); } .status-tag.unknown { color: var(--unknown); }
    .status-tag.skipped { color: var(--skipped); }
    .url { color: var(--muted); font-size: 12px; padding: 0 16px 8px; word-break: break-all; }
    .checks { border-top: 1px solid var(--border); }
    .check { display: flex; gap: 10px; padding: 11px 16px; align-items: flex-start;
      border-top: 1px solid var(--border); }
    .check:first-child { border-top: 0; }
    .check .src { font-size: 12px; font-weight: 600; color: var(--muted); min-width: 88px; }
    .check .msg { flex: 1; font-size: 13px; }
    .check .lat { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .empty { color: var(--muted); padding: 40px; text-align: center; }
    footer { color: var(--muted); font-size: 12px; padding: 16px 24px; text-align: center; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>F5<span>Auth</span>Tester</h1>
    <div class="meta">Entra ID → F5 BIG-IP APM · Secure Hybrid Access SSO health</div>
    <div class="spacer"></div>
    <div class="meta" id="lastrun">—</div>
    <button id="run">Run now</button>
  </header>
  <main>
    <div class="summary" id="summary"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" hidden>No report yet — running first check…</div>
  </main>
  <footer>
    Source: <code id="source">{{ source }}</code> · auto-refresh every 15s ·
    poll interval {{ poll_interval }}s · v{{ version }} ·
    <a href="/api/status">/api/status</a>
  </footer>

  <script id="variant-meta" type="application/json">{{ variant_meta | tojson }}</script>
  <script>
    const VARIANTS = JSON.parse(document.getElementById("variant-meta").textContent);
    const ORDER = ["fail", "unknown", "warn", "ok", "skipped"];
    const LABELS = { ok: "OK", warn: "Warn", fail: "Fail", unknown: "Unknown", skipped: "Skipped" };

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function renderSummary(summary) {
      const el = document.getElementById("summary");
      el.innerHTML = ORDER.map(s => {
        const n = summary[s] || 0;
        if (!n && s === "skipped") return "";
        return `<div class="pill"><span class="dot ${s}"></span>${LABELS[s]}: <strong>${n}</strong></div>`;
      }).join("");
    }

    function renderCheck(c) {
      const src = c.source === "active_probe" ? "Active probe" : "iControl REST";
      const lat = c.latency_ms != null ? `${c.latency_ms} ms` : "";
      return `<div class="check">
        <div class="src"><span class="dot ${c.status}"></span> ${src}</div>
        <div class="msg">${esc(c.message)}</div>
        <div class="lat">${lat}</div>
      </div>`;
    }

    function renderCard(t) {
      const v = VARIANTS[t.variant] || { label: t.variant, backend_sso: "" };
      return `<div class="card ${t.status}">
        <div class="card-head">
          <span class="name">${esc(t.name)}</span>
          <span class="badge" title="${esc(v.backend_sso)}">${esc(v.label)}</span>
          <span class="status-tag ${t.status}">${LABELS[t.status]}</span>
        </div>
        <div class="url">${esc(t.url)}</div>
        <div class="checks">${t.checks.map(renderCheck).join("")}</div>
      </div>`;
    }

    function render(data) {
      const report = data.report;
      const empty = document.getElementById("empty");
      const grid = document.getElementById("grid");
      document.getElementById("source").textContent = data.source ?? "—";
      if (!report || !report.results || report.results.length === 0) {
        empty.hidden = false; grid.innerHTML = ""; renderSummary({}); return;
      }
      empty.hidden = true;
      renderSummary(report.summary || {});
      const sorted = [...report.results].sort(
        (a, b) => ORDER.indexOf(a.status) - ORDER.indexOf(b.status));
      grid.innerHTML = sorted.map(renderCard).join("");
      const when = data.last_run || report.generated_at;
      document.getElementById("lastrun").textContent = when ? `Last run: ${when}` : "";
    }

    async function refresh() {
      try {
        const r = await fetch("/api/status");
        render(await r.json());
      } catch (e) { /* keep last view on transient error */ }
    }

    document.getElementById("run").addEventListener("click", async (ev) => {
      const btn = ev.target; btn.disabled = true; btn.textContent = "Running…";
      try { await fetch("/api/run", { method: "POST" }); await refresh(); }
      finally { btn.disabled = false; btn.textContent = "Run now"; }
    });

    refresh();
    setInterval(refresh, 15000);
  </script>
</body>
</html>
